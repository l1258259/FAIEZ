<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Faiez PS4 Host</title>

<style>

body{
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
font-family: Arial;
text-align:center;
color:white;
margin-top:120px;
}

h1{
font-size:40px;
color:#00ffd5;
}

p{
font-size:18px;
opacity:0.9;
}

button{
background:#00ffd5;
border:none;
padding:18px 40px;
font-size:22px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00bfa5;
transform:scale(1.1);
}

.box{
background:rgba(0,0,0,0.4);
padding:40px;
width:350px;
margin:auto;
border-radius:15px;
box-shadow:0 0 25px #00ffd5;
}

#status{
margin-top:20px;
font-size:18px;
color:#00ffd5;
}

</style>
</head>

<body>

<div class="box">

<h1>Faiez PS4 Host</h1>

<p>
مرحبا بك في صفحة فايز لتشغيل الجلبريك<br>
GoldHEN Loader
</p>

<button onclick="loadGoldhen()">تشغيل GoldHEN</button>

<div id="status">جاهز للتشغيل</div>

</div>

<script>

function loadGoldhen(){

document.getElementById("status").innerHTML="جاري تحميل GoldHEN ...";

fetch("goldhen.bin")
.then(response => response.arrayBuffer())
.then(data => {

document.getElementById("status").innerHTML="تم تحميل GoldHEN بنجاح";

})
.catch(error => {

document.getElementById("status").innerHTML="فشل التحميل";

});

}

</script>

</body>
</html>
